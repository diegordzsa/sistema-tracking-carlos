name: Call Report

on:
  schedule:
    # 7:15 UTC = 9:15 CEST (verano) / 8:15 CET (invierno) — runs after daily report
    - cron: '15 7 * * *'
  workflow_dispatch:

jobs:
  call-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run call report
        env:
          SHOPIFY_CLIENT_ID: ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ZADARMA_API_KEY: ${{ secrets.ZADARMA_API_KEY }}
          ZADARMA_API_SECRET: ${{ secrets.ZADARMA_API_SECRET }}
        run: python call_report.py
