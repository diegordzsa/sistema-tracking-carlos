name: COD Checker

on:
  schedule:
    # 8:00 UTC = 10:00 CEST (verano) / 9:00 CET (invierno)
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  cod-checker:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run COD checker
        env:
          SHOPIFY_CLIENT_ID: ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python cod_checker.py

      - name: Commit data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/orders_log.jsonl
          git diff --staged --quiet || git commit -m "Update COD status $(date -u +%Y-%m-%d)"
          git push
